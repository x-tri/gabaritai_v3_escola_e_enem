# ═══════════════════════════════════════════════════════════════════════════════
# XTRI Engine API — TRI V3 — Docker Compose (Desenvolvimento Local)
# ═══════════════════════════════════════════════════════════════════════════════
# Uso:
#   docker compose up --build        # Subir com rebuild
#   docker compose up -d             # Subir em background
#   docker compose logs -f tri-v3    # Ver logs
#   docker compose down              # Parar
# ═══════════════════════════════════════════════════════════════════════════════

services:
  tri-v3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xtri-tri-v3
    ports:
      - "5003:5003"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      # Hot-reload em desenvolvimento: monta o código local
      - ./app:/app/app:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5003/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
